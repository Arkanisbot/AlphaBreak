<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AlphaBreak{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#1a1a2e;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#1a1a2e;padding:20px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#16213e;border-radius:8px;overflow:hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background-color:#0f3460;padding:20px 30px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td>
                                        <h1 style="margin:0;font-size:24px;color:#4ecca3;letter-spacing:1px;">AlphaBreak</h1>
                                    </td>
                                    <td align="right" style="color:#888888;font-size:12px;">
                                        {% block header_tag %}{% endblock %}
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:30px;color:#e0e0e0;font-size:15px;line-height:1.6;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 30px;border-top:1px solid #2a2a4a;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="font-size:12px;color:#666666;line-height:1.8;">
                                        <a href="https://alphabreak.vip" style="color:#4ecca3;text-decoration:none;">Open AlphaBreak</a> &nbsp;|&nbsp;
                                        <a href="https://alphabreak.vip/#settings" style="color:#666666;text-decoration:none;">Notification Settings</a> &nbsp;|&nbsp;
                                        <a href="{{ unsubscribe_url | default('https://alphabreak.vip/api/notifications/unsubscribe?token=' ~ (unsubscribe_token | default(''))) }}" style="color:#666666;text-decoration:none;">Unsubscribe</a>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="font-size:11px;color:#444444;padding-top:10px;">
                                        &copy; {{ current_year | default('2026') }} AlphaBreak. All rights reserved.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
