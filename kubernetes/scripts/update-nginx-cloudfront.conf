## Nginx config for AlphaBreak behind CloudFront
## Replace your existing server block with this one
## Location: /etc/nginx/sites-available/alphabreak

server {
    listen 80;
    listen 443 ssl;
    server_name alphabreak.vip www.alphabreak.vip;

    ssl_certificate /etc/letsencrypt/live/alphabreak.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alphabreak.vip/privkey.pem;

    # Trust CloudFront IPs for real client IP
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /home/ubuntu/AlphaBreak/frontend;
    index index.html;

    # Static assets — long cache headers for CloudFront
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }

    # HTML — short cache, revalidate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # API — no caching, proxy to Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
