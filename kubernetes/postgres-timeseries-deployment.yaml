# TimescaleDB deployment for trading time-series data.
# Replaces the postgres-host-endpoints.yaml bridge used during Phase 1-2.
#
# Migration procedure (Phase 3):
#   1. Apply this file AFTER data is restored (see below).
#   2. On EC2, dump the bare-metal DB:
#        sudo -u postgres pg_dump -Fc trading_data -f /tmp/trading_data.dump
#   3. Wait for the pod to be Ready, then restore:
#        sudo k0s kubectl exec -n trading-system deployment/timeseries-postgres -- \
#          psql -U trading -d trading_data -c "SELECT timescaledb_pre_restore();"
#        cat /tmp/trading_data.dump | sudo k0s kubectl exec -i -n trading-system \
#          deployment/timeseries-postgres -- \
#          pg_restore -U trading -d trading_data --no-owner --no-privileges -Fc
#        sudo k0s kubectl exec -n trading-system deployment/timeseries-postgres -- \
#          psql -U trading -d trading_data -c "SELECT timescaledb_post_restore();"
#   4. Cut over the service:
#        sudo k0s kubectl delete endpoints postgres-timeseries-service -n trading-system
#        sudo k0s kubectl delete service postgres-timeseries-service -n trading-system
#        sudo k0s kubectl apply -f kubernetes/postgres-timeseries-deployment.yaml
#   5. Verify Flask API still works, then stop bare-metal postgres.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeseries-postgres
  namespace: trading-system
  labels:
    app: timeseries-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timeseries-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: timeseries-postgres
    spec:
      containers:
      - name: timescaledb
        image: timescale/timescaledb:2.24.0-pg15
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: timeseries-postgres-db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: timeseries-postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: timeseries-postgres-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "trading", "-d", "trading_data"]
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "trading", "-d", "trading_data"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: timeseries-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-timeseries-service
  namespace: trading-system
spec:
  selector:
    app: timeseries-postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
