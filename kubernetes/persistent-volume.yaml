# Persistent Volumes for EC2 k0s Single-Node Deployment
# =======================================================
# Uses hostPath volumes mapped to EC2 filesystem paths.
# Node affinity pins volumes to the single k0s node.
#
# Node: ip-172-31-22-21

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: trading-models-pv
  labels:
    type: local
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /home/ubuntu/flask_app/models
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - ip-172-31-22-21

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trading-models-pvc
  namespace: trading-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-storage
  volumeName: trading-models-pv

