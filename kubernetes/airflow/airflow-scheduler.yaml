apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: trading-system
  labels:
    app: airflow
    component: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
      component: scheduler
  template:
    metadata:
      labels:
        app: airflow
        component: scheduler
    spec:
      serviceAccountName: airflow-scheduler
      securityContext:
        fsGroup: 0
      initContainers:
      - name: db-init
        image: airflow-trading:latest
        imagePullPolicy: Never
        command:
        - bash
        - -c
        - |
          while ! airflow db upgrade 2>/dev/null; do
            echo "Waiting for Airflow metadata DB..."
            sleep 5
          done
          airflow users create \
            --username admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@trading.local \
            --password "${AIRFLOW_ADMIN_PASSWORD}" || true
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: "KubernetesExecutor"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: airflow-db-conn
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: airflow-fernet-key
        - name: AIRFLOW_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: airflow-admin-password
      containers:
      - name: scheduler
        image: airflow-trading:latest
        imagePullPolicy: Never
        command: ["airflow", "scheduler"]
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: "KubernetesExecutor"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: airflow-db-conn
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: airflow-fernet-key
        - name: AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE
          value: "trading-system"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__POD_TEMPLATE_FILE
          value: "/opt/airflow/pod_template.yaml"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__DELETE_WORKER_PODS
          value: "True"
        - name: AIRFLOW__KUBERNETES_EXECUTOR__DELETE_WORKER_PODS_ON_FAILURE
          value: "False"
        # Trading DB env vars (passed through to task pods via pod template)
        - name: DB_HOST
          value: "postgres-timeseries-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: timeseries-postgres-db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: timeseries-postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: trading-secrets
              key: timeseries-postgres-password
        - name: PYTHONPATH
          value: "/app/flask_app:/app/src"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /opt/airflow/logs
        - name: pod-template
          mountPath: /opt/airflow/pod_template.yaml
          subPath: pod_template.yaml
      volumes:
      - name: logs
        emptyDir: {}
      - name: pod-template
        configMap:
          name: airflow-pod-template
