apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: trading-system
  labels:
    app: airflow
    component: webserver
spec:
  type: NodePort
  selector:
    app: airflow
    component: webserver
  ports:
  - name: web
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30880
