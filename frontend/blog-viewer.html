<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaBreak Blog</title>
    <link rel="stylesheet" href="styles.css?v=1">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background: #0f0f1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            line-height: 1.7;
        }
        .article-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2a3e;
        }
        .nav-bar a {
            color: #4ecca3;
            text-decoration: none;
            font-size: 0.95em;
        }
        .nav-bar a:hover { text-decoration: underline; }
        .article-content h1 {
            color: #fff;
            font-size: 2.2em;
            margin: 0 0 8px 0;
            line-height: 1.2;
        }
        .article-content h2 {
            color: #4ecca3;
            font-size: 1.5em;
            margin-top: 50px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a3e;
        }
        .article-content h3 {
            color: #fff;
            font-size: 1.2em;
            margin-top: 30px;
            margin-bottom: 12px;
        }
        .article-content p {
            color: #c0c0d0;
            margin: 16px 0;
        }
        .article-content em {
            color: #a0a0b0;
            font-style: italic;
        }
        .article-content strong {
            color: #fff;
        }
        .article-content ul, .article-content ol {
            color: #c0c0d0;
            padding-left: 24px;
        }
        .article-content li {
            margin: 8px 0;
        }
        .article-content blockquote {
            border-left: 3px solid #4ecca3;
            padding-left: 16px;
            margin-left: 0;
            color: #a0a0b0;
            font-style: italic;
        }
        .article-content code {
            background: #1a1a2e;
            padding: 2px 6px;
            border-radius: 3px;
            color: #4ecca3;
            font-size: 0.9em;
        }
        .article-content pre {
            background: #1a1a2e;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid #2a2a3e;
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: #c0c0d0;
        }
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            background: #1a1a2e;
            border-radius: 6px;
            overflow: hidden;
        }
        .article-content th, .article-content td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }
        .article-content th {
            background: #252540;
            color: #4ecca3;
            font-weight: 600;
        }
        .article-content tr:last-child td {
            border-bottom: none;
        }
        .article-content hr {
            border: none;
            border-top: 1px solid #2a2a3e;
            margin: 40px 0;
        }
        .article-content a {
            color: #4ecca3;
            text-decoration: none;
        }
        .article-content a:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6a6a7e;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #ff6b6b;
        }
        .cta-bottom {
            background: linear-gradient(135deg, #1a1a2e, #252540);
            border: 1px solid #4ecca3;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin: 60px 0 40px 0;
        }
        .cta-bottom h3 { color: #fff; margin: 0 0 10px 0; }
        .cta-bottom p { color: #a0a0b0; margin: 0 0 20px 0; }
        .cta-button {
            display: inline-block;
            background: #4ecca3;
            color: #0f0f1e;
            padding: 12px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .article-container { padding: 20px 16px; }
            .article-content h1 { font-size: 1.6em; }
            .article-content h2 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="article-container">
        <nav class="nav-bar">
            <a href="/blogs">← All Articles</a>
            <a href="/">AlphaBreak →</a>
        </nav>

        <div id="article-content" class="article-content">
            <div class="loading">Loading article...</div>
        </div>

        <div class="cta-bottom">
            <h3>Ready to apply this in real time?</h3>
            <p>AlphaBreak provides AI-scored analysis, automated risk calculations, and structured journaling.</p>
            <a href="/" class="cta-button">Try AlphaBreak Free →</a>
        </div>

        <nav class="nav-bar">
            <a href="/blogs">← All Articles</a>
            <a href="/">AlphaBreak →</a>
        </nav>
    </div>

    <script>
        // Get the article slug from the URL
        const path = window.location.pathname;
        const slug = path.replace('/blogs/', '').replace(/\/$/, '');

        if (!slug || slug === 'blogs') {
            window.location.href = '/blogs';
        } else {
            // Fetch the markdown file
            fetch(`/blog/${slug}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('Article not found');
                    return response.text();
                })
                .then(markdown => {
                    const html = marked.parse(markdown);
                    document.getElementById('article-content').innerHTML = html;

                    // Update title from first H1
                    const firstH1 = document.querySelector('.article-content h1');
                    if (firstH1) {
                        document.title = firstH1.textContent + ' — AlphaBreak Blog';
                    }
                })
                .catch(err => {
                    document.getElementById('article-content').innerHTML =
                        '<div class="error">Article not found. <a href="/blogs">Back to all articles</a></div>';
                });
        }
    </script>
</body>
</html>
